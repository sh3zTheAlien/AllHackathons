  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0322b004-bc4f-4a8b-b969-b294d4e49ffd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"669176ff-26db-49a2-b9f7-40bb9e26fd0e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Newsreader';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"690a92f9-bdee-448f-b9d7-71402af2eee1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#f3efe6; }\n  * { box-sizing:border-box; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background:#f3efe6;min-height:100vh;font-family:'Hanken Grotesk',sans-serif;color:#23211c;padding-bottom:0;\">\n\n  <!-- ===== top bar ===== -->\n  <div style=\"border-bottom:1px solid #e3dccd;background:#f6f2ea;\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;\">\n      <div style=\"display:flex;align-items:baseline;gap:12px;\">\n        <span style=\"font-family:Newsreader,serif;font-size:23px;font-weight:600;letter-spacing:-.01em;\">GreekHackathons<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#9a917f;\">maintained by the community<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:28px;font-size:14.5px;color:#5d564a;\">\n        <span style=\"color:#23211c;font-weight:500;\">Hackathons<\u002Fspan>\n        <span>Survival guide<\u002Fspan>\n        <span>Submit a hackathon<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;background:#5865f2;color:#fff;padding:9px 16px;border-radius:8px;font-weight:600;font-size:13.5px;\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#9ae6b4;display:inline-block;\"><\u002Fspan>Join Discord\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== hero ===== -->\n  <div style=\"max-width:1140px;margin:0 auto;padding:64px 40px 46px;display:grid;grid-template-columns:1.5fr 1fr;gap:64px;align-items:center;\">\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:#2f5d86;margin-bottom:20px;\">Ένα μέρος για όλα<\u002Fdiv>\n      <h1 style=\"font-family:Newsreader,serif;font-weight:500;font-size:50px;line-height:1.08;letter-spacing:-.015em;margin:0;max-width:15ch;\">Κάθε hackathon στην Ελλάδα, σε μία ήσυχη λίστα.<\u002Fh1>\n      <p style=\"font-size:17.5px;line-height:1.62;color:#5d564a;margin:24px 0 0;max-width:50ch;\">Φτιαγμένη και ενημερωμένη από κόσμο που πάει σε hackathons — όχι από αλγόριθμο. Βρες το επόμενό σου hackathon, μπες στο Discord, και αν λείπει κάτι, πρόσθεσέ το.<\u002Fp>\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:32px;\">\n        <span style=\"background:#23211c;color:#f3efe6;padding:12px 22px;border-radius:9px;font-weight:600;font-size:15px;\">Δες τα hackathons<\u002Fspan>\n        <span style=\"color:#2f5d86;font-weight:600;font-size:15px;border-bottom:1.5px solid #c5d4e0;padding-bottom:2px;\">ή μπες στην κοινότητα →<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- community card -->\n    <div style=\"background:#fffdf8;border:1px solid #e6dfd0;border-radius:16px;padding:28px;box-shadow:0 1px 2px rgba(60,50,20,.04);\">\n      <div style=\"display:flex;align-items:center;gap:-8px;margin-bottom:18px;\">\n        <sc-for list=\"{{ contributors }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <span style=\"width:34px;height:34px;border-radius:50%;background:{{ c.bg }};color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;margin-right:-9px;border:2px solid #fffdf8;font-family:'Hanken Grotesk';\">{{ c.i }}<\u002Fspan>\n        <\u002Fsc-for>\n        <span style=\"margin-left:18px;font-size:13px;color:#7a7263;\">+ 30 ακόμη<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px 16px;\">\n        <div><div style=\"font-family:Newsreader,serif;font-size:30px;font-weight:600;\">{{ total }}<\u002Fdiv><div style=\"font-size:12.5px;color:#7a7263;margin-top:2px;\">ενεργά hackathons<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:Newsreader,serif;font-size:30px;font-weight:600;\">{{ cities }}<\u002Fdiv><div style=\"font-size:12.5px;color:#7a7263;margin-top:2px;\">πόλεις &amp; online<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:Newsreader,serif;font-size:30px;font-weight:600;\">2.3k<\u002Fdiv><div style=\"font-size:12.5px;color:#7a7263;margin-top:2px;\">μέλη στο Discord<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:Newsreader,serif;font-size:30px;font-weight:600;\">{{ lastUpdated }}<\u002Fdiv><div style=\"font-size:12.5px;color:#7a7263;margin-top:2px;\">τελευταία ενημέρωση<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== next up ===== -->\n  <div style=\"max-width:1140px;margin:0 auto;padding:8px 40px 10px;\">\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a917f;\">Coming soon<\u002Fspan>\n      <span style=\"flex:1;height:1px;background:#e3dccd;\"><\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"background:#2f5d86;color:#eef4f8;border-radius:16px;padding:30px 34px;display:flex;justify-content:space-between;align-items:center;gap:28px;flex-wrap:wrap;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;font-size:13px;color:#bcd3e4;\">\n          <span>{{ next.mode }}<\u002Fspan><span>·<\u002Fspan><span>{{ next.city }}<\u002Fspan><span>·<\u002Fspan><span>added by {{ next.addedBy }} ✓<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:Newsreader,serif;font-size:30px;font-weight:500;margin-top:10px;letter-spacing:-.01em;\">{{ next.name }}<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;margin-top:16px;\">\n          <sc-for list=\"{{ next.tags }}\" as=\"tag\" hint-placeholder-count=\"2\"><span style=\"font-size:11.5px;padding:5px 11px;border:1px solid rgba(255,255,255,.28);border-radius:999px;color:#dce8f1;\">{{ tag }}<\u002Fspan><\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;\">\n        <div style=\"font-family:Newsreader,serif;font-size:34px;font-weight:600;line-height:1;\">{{ next.day }} {{ next.monG }}<\u002Fdiv>\n        <div style=\"font-size:13px;color:#bcd3e4;margin-top:8px;\">{{ next.cd }} · {{ next.prize }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== full list ===== -->\n  <div style=\"max-width:1140px;margin:0 auto;padding:40px 40px 16px;\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:22px;\">\n      <h2 style=\"font-family:Newsreader,serif;font-size:27px;font-weight:600;margin:0;letter-spacing:-.01em;\">Όλα τα hackathons<\u002Fh2>\n      <div style=\"display:flex;gap:8px;align-items:center;\">\n        <span style=\"display:inline-flex;align-items:center;gap:7px;border:1px solid #d8d0bf;background:#fffdf8;padding:7px 13px;border-radius:999px;font-size:13px;color:#23211c;font-weight:500;\">\n          <span style=\"color:#2f5d86;\">◍<\u002Fspan>{{ region }}<span style=\"color:#a59c89;font-size:11px;margin-left:1px;\">▾<\u002Fspan>\n        <\u002Fspan>\n        <span style=\"width:1px;height:18px;background:#e3dccd;margin:0 3px;\"><\u002Fspan>\n        <span style=\"background:#23211c;color:#f3efe6;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:500;\">Όλα<\u002Fspan>\n        <span style=\"border:1px solid #d8d0bf;padding:7px 15px;border-radius:999px;font-size:13px;color:#5d564a;\">In person<\u002Fspan>\n        <span style=\"border:1px solid #d8d0bf;padding:7px 15px;border-radius:999px;font-size:13px;color:#5d564a;\">Online<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n      <sc-for list=\"{{ list }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fffdf8;border:1px solid #e6dfd0;border-radius:14px;padding:24px;display:flex;gap:20px;\">\n          <div style=\"text-align:center;flex-shrink:0;width:56px;\">\n            <div style=\"font-family:Newsreader,serif;font-size:28px;font-weight:600;line-height:1;color:#2f5d86;\">{{ item.day }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9a917f;text-transform:uppercase;letter-spacing:.06em;margin-top:3px;\">{{ item.monG }}<\u002Fdiv>\n            <div style=\"font-size:10.5px;color:#b0a895;margin-top:8px;\">{{ item.cd }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;border-left:1px solid #ece5d6;padding-left:20px;\">\n            <div style=\"font-family:Newsreader,serif;font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.2;\">{{ item.name }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#7a7263;margin-top:7px;\">{{ item.city }} · {{ item.mode }} · {{ item.prize }}<\u002Fdiv>\n            <div style=\"display:flex;gap:7px;margin-top:14px;\">\n              <sc-for list=\"{{ item.tags }}\" as=\"tag\" hint-placeholder-count=\"2\"><span style=\"font-size:11px;padding:4px 10px;background:#efe9dc;border-radius:999px;color:#6f6757;\">{{ tag }}<\u002Fspan><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;color:#9a917f;\">\n              <span>added by<\u002Fspan><span style=\"color:#5d564a;font-weight:500;\">{{ item.addedBy }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:3px;color:#3f7d5a;margin-left:4px;\">✓ reviewed<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"text-align:center;margin-top:24px;\">\n      <span style=\"font-size:14px;color:#2f5d86;font-weight:600;border-bottom:1.5px solid #c5d4e0;padding-bottom:2px;\">Δες περισσότερα →<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== community + guides ===== -->\n  <div style=\"max-width:1140px;margin:0 auto;padding:44px 40px;display:grid;grid-template-columns:1fr 1.25fr;gap:24px;\">\n    <!-- discord -->\n    <div style=\"background:#fffdf8;border:1px solid #e6dfd0;border-radius:16px;padding:32px;display:flex;flex-direction:column;justify-content:space-between;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <span style=\"width:38px;height:38px;border-radius:10px;background:#5865f2;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:Newsreader,serif;\">D<\u002Fspan>\n          <span style=\"font-family:Newsreader,serif;font-size:22px;font-weight:600;\">Η κοινότητα ζει στο Discord<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.6;color:#5d564a;margin:18px 0 0;\">Ομάδες που ψάχνουν μέλη, ερωτήσεις πριν φύγεις, post-mortems, και ο κόσμος που κρατάει αυτή τη λίστα ζωντανή. 2.300+ builders.<\u002Fp>\n      <\u002Fdiv>\n      <span style=\"margin-top:26px;align-self:flex-start;background:#5865f2;color:#fff;padding:11px 20px;border-radius:9px;font-weight:600;font-size:14.5px;\">Μπες στο Discord →<\u002Fspan>\n    <\u002Fdiv>\n    <!-- guides -->\n    <div>\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:16px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9a917f;\">Πριν πας<\u002Fspan>\n        <span style=\"flex:1;height:1px;background:#e3dccd;\"><\u002Fspan>\n      <\u002Fdiv>\n      <sc-for list=\"{{ guides }}\" as=\"g\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fffdf8;border:1px solid #e6dfd0;border-radius:13px;padding:20px 22px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:18px;\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:7px;\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:{{ g.tagBg }};padding:3px 7px;border-radius:4px;\">{{ g.kind }}<\u002Fspan>\n              <span style=\"font-size:11.5px;color:#a59c89;\">{{ g.read }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:Newsreader,serif;font-size:18px;font-weight:600;letter-spacing:-.01em;line-height:1.25;\">{{ g.title }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"color:#c3bba8;font-size:20px;flex-shrink:0;\">→<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== submit band ===== -->\n  <div style=\"max-width:1140px;margin:0 auto;padding:12px 40px 64px;\">\n    <div style=\"border:1.5px dashed #cfc6b2;border-radius:16px;padding:38px 40px;text-align:center;background:#f6f2ea;\">\n      <h3 style=\"font-family:Newsreader,serif;font-size:26px;font-weight:600;margin:0;letter-spacing:-.01em;\">Λείπει κάποιο hackathon;<\u002Fh3>\n      <p style=\"font-size:15.5px;color:#5d564a;margin:12px auto 0;max-width:54ch;line-height:1.6;\">Δεν χρειάζεται να το διοργανώνεις εσύ. Όποιος ξέρει για ένα event μπορεί να το προσθέσει — η ομάδα το ελέγχει και μπαίνει στη λίστα. Έτσι μένει αξιόπιστη.<\u002Fp>\n      <span style=\"display:inline-block;margin-top:24px;background:#23211c;color:#f3efe6;padding:12px 26px;border-radius:9px;font-weight:600;font-size:15px;\">+ Πρόσθεσε ένα hackathon<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== footer ===== -->\n  <div style=\"border-top:1px solid #e3dccd;background:#f6f2ea;\">\n    <div style=\"max-width:1140px;margin:0 auto;padding:28px 40px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#9a917f;\">\n      <span style=\"font-family:Newsreader,serif;font-size:16px;color:#23211c;\">GreekHackathons<\u002Fspan>\n      <span>Φτιαγμένο από την κοινότητα, για την κοινότητα · Open source · Discord<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const RAW = [\n      { name: 'Demokritos AI Hack', city: 'Αθήνα', mode: 'In person', date: '2026-07-18', prize: 'Mentorship', org: 'NCSR Demokritos', tags: ['AI', 'Research'], addedBy: '@nikos' },\n      { name: 'Hellenic Space Hackathon', city: 'Online', mode: 'Online', date: '2026-08-30', prize: '€5,000', org: 'NOA · ESA BIC', tags: ['Space', 'Data'], addedBy: '@maria_k' },\n      { name: 'Crete Marine Tech Hack', city: 'Ηράκλειο', mode: 'In person', date: '2026-09-05', prize: '€6,000', org: 'FORTH', tags: ['BlueTech', 'Climate'], addedBy: '@giorgos' },\n      { name: 'Patras IQ Hackathon', city: 'Πάτρα', mode: 'In person', date: '2026-09-26', prize: '€10,000', org: 'Παν. Πατρών', tags: ['Deep Tech', 'Hardware'], addedBy: '@eleni' },\n      { name: 'Thessaloniki Smart City Hack', city: 'Θεσσαλονίκη', mode: 'In person', date: '2026-10-10', prize: '€8,000', org: 'OK!Thess', tags: ['Smart City', 'IoT'], addedBy: '@tasos' },\n      { name: 'Greece–Türkiye Hackathon', city: 'Αθήνα × Κωνσταντινούπολη', mode: 'Hybrid', date: '2026-11-14', prize: '€30,000', org: 'Beyond Expo', tags: ['Cross-border', 'AI'], addedBy: '@dimitra' },\n      { name: 'Athens Fintech Hack', city: 'Αθήνα', mode: 'Hybrid', date: '2026-12-05', prize: '€12,000', org: 'found.ation', tags: ['Fintech', 'Web3'], addedBy: '@kostas' },\n    ];\n    const today = new Date('2026-06-28T00:00:00');\n    const MONG = ['Ιαν', 'Φεβ', 'Μαρ', 'Απρ', 'Μάι', 'Ιουν', 'Ιουλ', 'Αυγ', 'Σεπ', 'Οκτ', 'Νοε', 'Δεκ'];\n    const enrich = (it) => {\n      const d = new Date(it.date + 'T00:00:00');\n      const days = Math.round((d - today) / 86400000);\n      let cd;\n      if (days <= 0) cd = 'τώρα';\n      else if (days < 14) cd = 'σε ' + days + ' μέρες';\n      else if (days < 60) cd = 'σε ' + Math.round(days / 7) + ' εβδ.';\n      else cd = 'σε ' + Math.round(days / 30) + ' μήνες';\n      return Object.assign({}, it, { day: d.getDate(), monG: MONG[d.getMonth()], cd, days });\n    };\n    const all = RAW.map(enrich).sort((a, b) => a.days - b.days);\n    const next = all[0];\n    const list = all.slice(1);\n    const cities = new Set(RAW.map((r) => (r.mode === 'Online' ? 'Online' : r.city.split(' ')[0]))).size;\n    const contributors = [\n      { i: 'NK', bg: '#2f5d86' }, { i: 'MA', bg: '#b9663f' }, { i: 'GP', bg: '#3f7d5a' },\n      { i: 'EL', bg: '#8a6d3b' }, { i: 'TS', bg: '#5e5170' }, { i: 'DI', bg: '#a0512f' },\n    ];\n    const guides = [\n      { kind: 'Guide', tagBg: '#2f5d86', read: '6 min', title: 'Το πρώτο σου hackathon; 9 πράγματα που θα ήθελες να ήξερες' },\n      { kind: 'Guide', tagBg: '#3f7d5a', read: '4 min', title: 'Πώς να φτιάξεις ομάδα σε 10 λεπτά (χωρίς να ξέρεις κανέναν)' },\n      { kind: 'Fun', tagBg: '#b9663f', read: '2 min', title: 'Tier list: τα φαγητά με τα οποία επιβιώνεις στις 3 το πρωί' },\n    ];\n    const lastUpdated = today.getDate() + ' ' + MONG[today.getMonth()];\n    const region = 'Όλη η Ελλάδα';\n    return { next, list, total: all.length, cities, contributors, guides, lastUpdated, region };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
